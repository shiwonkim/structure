random_state: 42

paths:
    data_path: "./data"
    save_path: "./results"

features:
    modelset: "val" # val, test
    modality: "all" # vision, language, all

    pool_img: "cls"
    pool_txt: "avg" # last, avg

    # Force a fixed input resolution for the vision encoder.
    # 224 -> ViT-S/14: 16*16+1 = 257 tokens, ViT-L/14: 16*16+1 = 257 tokens.
    # All experiments share the same per-(model, dataset, split, layer)
    # token cache; CLS experiments slice tokens[:, 0, :], token experiments
    # use the full (N, T, D) tensor. See IMPLEMENTATION.md for the
    # unified extraction design.
    img_size: 224

    # When true, image-side token extraction (pool=none) writes one row
    # per UNIQUE image_path instead of one row per (image, caption) pair.
    # COCO has ~5 captions per image, so this saves ~5x extraction time
    # AND ~5x disk space on the train cache (~250 GB at ViT-L). Text
    # extraction stays at the full row count because each caption is
    # genuinely different. fit() detects the deduped layout via shape
    # and skips the redundant per-row dedup it would otherwise apply.
    # Auto-disabled when:
    #   - training.drop_duplicates is false
    #   - training.n_dup_samples != 1
    #   - n_random_subsample_train is set (dryrun first-N path)
    image_dedup_extraction: true

    dataset: "coco"
    label_templates:
        - "a photo of a {label}"
    template_key: "label"
    precompute_captions: true

    # Server B: dropped 8 → 0 (no worker forks at all). Under the
    # container's vm.overcommit_memory=0 (heuristic) setting, even 2
    # DataLoader worker forks get refused with ENOMEM after the
    # trainer has loaded ViT-L/RoBERTa-L weights and feature caches.
    # num_workers=0 runs the loader in the main process — zero throughput
    # cost on cached feature training, zero fork risk.
    num_workers: 0
    batch_size: 16

alignment:
    llm_model_name: "sentence-transformers/all-roberta-large-v1"
    lvm_model_name: "vit_large_patch14_dinov2.lvd142m"

layer_selection:
    type: "random"
    n_samples: 5_000
    metric: "mutual_knn"
    metric_kwargs:
        topk: "rice"
        normalize: true
    n_score_bins: 5
    best_only: true
    last_only: false
    n_last_layers: null

training:
    n_epochs: 1000
    batch_size: 4096

    learning_rate: &lr 1.0e-3 # 3e-5, 8.0e-4
    use_lr_finder: true
    lr_finder:
        num_iter: 100
        start_lr: 1.0e-7
        end_lr: 10

    # ABLATION PARAMS
    mixup_alpha: 0.0 # if > 0.0 then it uses FuseMix
    fixed_structure: false

    clip_grad: 1.0
    early_stopping: true
    early_stopping_patience: 200

    drop_duplicates: true
    n_dup_samples: 1

    wandb_watch: false
    embedding_visualization: 500
    visualize_original_embeddings: false
    log_structural_preservation: false
    structural_preservation_k:
        - 100
        - 1_000

    unimodal_data:
        use: false
        text:
            - "flickr30"
        image:
            - "stl10"

    # will be overwritten in the specific yamls
    alignment_layer_name: "LinearAlignmentLayer"
    alignment_layer_kwargs:
        dim_alignment: 256

    clip_loss_name: "CLIPLoss"
    clip_loss:
        temperature: 0.05
        normalize_latents: true

        warmup_steps: 1000
        structure_lambda: 10.0
        structure_levels: 1
        structure_margin: 0.0
        structure_weighting: "none"

    optimizer_name: "AdamW"
    optimizer_kwargs:
        betas: [0.9, 0.95]
        weight_decay: 1.0e-4 # 3e-7

    scheduler_name: "CosineAnnealingLR"
    scheduler_kwargs:
        warmup_min_lr: 0.0
        warmup_max_lr: *lr
        warmup_num_steps: 10_000
    scheduler_epoch_cycles: 50

evaluation:
    batch_size: 256
    # Server B: 8 → 0. evaluate_retrieval() inside fit() spawns a
    # DataLoader for COCO/Flickr retrieval eval which forks 8 workers;
    # that fork is refused under vm.overcommit_memory=0 after the
    # trainer has loaded ViT-L + RoBERTa-L + feature caches. See the
    # matching features.num_workers comment above.
    num_workers: 0
    num_classes_per_batch: 2
    use_extended_prompts: true
    sample_by_sample_embedding: false

    # further insights
    plot_embedding_space: false
    log_structural_preservation: false
    structural_preservation_k:
        - 100
        - 1_000

    drop_duplicates: false

    # When true AND training.token_level=true, zero-shot classification
    # runs through the BA-token CAP path (3D image tokens + 3D template
    # tokens with mask) instead of the CLS fallback. False keeps the
    # legacy CLS-only zero-shot eval. See IMPLEMENTATION.md.
    token_level_zero_shot: false

    zero_shot_datasets:
        # Coarse concepts (e.g. ships, planes)
        - "stl10"
        - "caltech101"
        - "food101"
        - "cifar10"
        - "cifar100"
        - "imagenet"
        - "ucf101"
        - "kinetics700"
        - "sun397"
        - "eurosat"
        - "resisc45"
        - "mnist"
        - "dtd"

        # Exotic concepts (e.g. emotions, counting)
        - "gtsrb"
        - "hatefulmemes"
        - "sst"
        - "kitti"
        - "country211"
        - "fer2013"
        - "clevr"

        # Specific concepts (e.g. species of birds)
        - "pcam"
        - "birdsnap"
        - "cars"
        - "aircraft"
        - "pets"
        - "flowers"

    retrieval_datasets:
        - "flickr30"
        - "coco"
