defaults: !include default.yaml

overrides:
    features:
        dataset: "cifar10"
        num_workers: 2
        batch_size: 64

    alignment:
        llm_model_name: "sentence-transformers/all-MiniLM-L6-v2"
        lvm_model_name: "vit_small_patch14_dinov2.lvd142m"

    layer_selection:
        type: "random"
        n_samples: 500
        metric: "mutual_knn"
        metric_kwargs:
            topk: "rice"
            normalize: true
        n_score_bins: 5
        best_only: true
        last_only: false
        n_last_layers: null

    training:
        # Enable token-level training path
        token_level: true

        # Small dry-run training budget
        n_epochs: 2
        batch_size: 256
        use_lr_finder: false
        early_stopping: false
        early_stopping_patience: 5
        clip_grad: 1.0
        drop_duplicates: false
        wandb_watch: false
        visualize_original_embeddings: false
        log_structural_preservation: false
        embedding_visualization: 9999

        # Subsample to keep the dry run fast and memory-light
        n_random_subsample_train: 2000
        n_random_subsample_val: 1000

        alignment_layer_name: "BridgeAnchorTokenAlignmentLayer"
        alignment_layer_kwargs:
            num_anchors: 128
            pool_temperature: 0.05
            projector_dim: 0

        clip_loss_name: "CLIPLoss"
        clip_loss:
            temperature: 0.05
            normalize_latents: true
            warmup_steps: 10
            # structure_lambda MUST be 0 in token_level dry run — structure_reg
            # expects 2D original embeddings.
            structure_lambda: 0
            structure_levels: 1
            structure_margin: 0.0
            structure_weighting: "none"

        scheduler_name: "CosineAnnealingLR"
        scheduler_kwargs: {}
        scheduler_epoch_cycles: 2

    evaluation:
        batch_size: 64
        num_workers: 2
        num_classes_per_batch: 2
        plot_embedding_space: false
        log_structural_preservation: false
        zero_shot_datasets:
            - "cifar10"
        retrieval_datasets: []
